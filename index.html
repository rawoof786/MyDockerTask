<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>APSRTC — Book Your Bus</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<header class="site-header">
<div class="container">
<h1>APSRTC Bus Booking</h1>
<p class="tag">Safe. Reliable. On-time.</p>
</div>
</header>


<main class="container">
<section class="search">
<div class="search-row">
<input id="from" placeholder="From (City)" />
<input id="to" placeholder="To (City)" />
<input id="date" type="date" />
<button id="searchBtn">Search Buses</button>
</div>
</section>


<section id="results" class="results">
<!-- Results inserted by JS -->
</section>


<section class="info">
<h2>How to book</h2>
<ol>
<li>Search using origin, destination and date.</li>
<li>Choose a bus and seats, click Book.</li>
<li>Fill traveller details and confirm payment (mock).</li>
</html>
